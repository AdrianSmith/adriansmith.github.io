site: Adrian Smith
title: Adrian Smith
email: adrianlloydsmith@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Personal blog of Dr Adrian Smith and Engineer and Technologist
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://adriansmith.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: adrianlsmith
github_username:  adriansmith

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /blog/:slug
  projects:
    output: true
    permalink: /project/:slug

defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

sass:
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-sitemap

paginate: 6
paginate_path: "/blog/page:num/"
